short_bio: >-
  <p>
    I am a Ph.D. student in Cyber Science and Engineering at <a href="https://www.scu.edu.cn/" target="_blank">Sichuan University</a>.
    My research focuses on <span class="text-hl">federated learning</span>, <span class="text-hl">image generation</span>, and <span class="text-hl">AI for healthcare</span>.
  </p>
  <p>
    I am especially interested in representation learning for distributed, privacy-sensitive, and clinically complex settings: how models can learn from heterogeneous clients, preserve useful local knowledge, and still build robust global representations.
    My recent work spans federated visual learning, reliable multi-label medical image diagnosis, and LLM-orchestrated CT reconstruction, while my earlier work studied deep learning methods for MRI reconstruction, CT reconstruction and denoising, CT metal artifact reduction, and OCT speckle reduction.
  </p>
  <p>
    Before starting my doctoral study, I worked as a Software Engineer at Huawei Cloud Computing Technology Co., Ltd.,
    where I gained practical experience in cloud computing, large-scale distributed systems, and data analysis.
  </p>
  <p>
    For collaboration, feel free to reach me at <a href="mailto:yqhuang2912@gmail.com">yqhuang2912@gmail.com</a>.
  </p>

